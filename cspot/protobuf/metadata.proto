syntax = "proto2";

message AudioFile {
    optional bytes file_id = 1;
    optional AudioFormat format = 2;
}

message Restriction {
    optional string countries_allowed = 0x2;
    optional string countries_forbidden = 0x3;
}

message Image {
    optional bytes file_id = 0x1;
}

message ImageGroup {
    repeated Image image = 0x1;
}

message Album {
    optional bytes gid = 0x1;
    optional string name = 0x2;
    optional ImageGroup cover_group = 0x11;
}

message Artist {
    optional bytes gid = 0x1;
    optional string name = 0x2;
}

message Track {
    optional bytes gid = 1;
    optional string name = 2;
    optional sint32 number = 5;
    optional sint32 disc_number = 6;
    optional sint32 duration = 0x7;
    optional Album album = 0x3;
    repeated Artist artist = 0x4;
    repeated Restriction restriction = 0xb;
    repeated AudioFile file = 0xc;
    repeated Track alternative = 0xd;
}

message Episode {
    optional bytes gid = 1;
    optional string name = 2;
    optional sint32 duration = 7;
    optional sint32 number = 65;
    repeated AudioFile file = 12;
    repeated Restriction restriction = 0x4B;
    optional ImageGroup covers = 0x44;
}

// Was missing/wrong past index 7 (had AAC_24=8, AAC_48=9, nothing past
// that) - corrected against librespot's current metadata.proto (verified
// against both the real .proto source in librespot-golang and the
// generated librespot-metadata Rust docs, both agree). The two renamed
// entries (8, 9) and the four added ones (10-13) are why some podcast
// episodes' AudioFile.format values (seen in the logs as plain integers,
// e.g. "File format: 12") didn't match anything nanopb could name -
// nanopb still decodes/stores unknown-to-us numeric enum values fine, so
// this is a correctness/readability fix, not something that was silently
// failing before. See docs/spotify_component_analysis.md, finding F60.
enum AudioFormat {
    OGG_VORBIS_96 = 0;
    OGG_VORBIS_160 = 1;
    OGG_VORBIS_320 = 2;
    MP3_256 = 3;
    MP3_320 = 4;
    MP3_160 = 5;
    MP3_96 = 6;
    MP3_160_ENC = 7;
    MP4_128_DUAL = 8;
    OTHER3 = 9;
    AAC_160 = 10;
    AAC_320 = 11;
    MP4_128 = 12;
    OTHER5 = 13;
}
