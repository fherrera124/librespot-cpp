[tool.poetry]
name = "bell-dsp-analyze"
version = "0.1.0"
description = "A Python wrapper over bell dsp, used for testing and visualizing the PCM data"
authors = []
packages = [
    { include = "python-bindings" }
]

[tool.poetry.dependencies]
python = "^3.9"
numpy = "^1.25.0"
matplotlib = "^3.8.0"
scipy = "^1.11.0"

[tool.poetry.scripts]
plot-pipeline = "python-bindings.plot_pipeline:main"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
