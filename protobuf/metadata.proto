syntax = "proto2";

import "nanopb.proto";

message AudioFile {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes file_id = 1;
    optional AudioFormat format = 2;
}

message Restriction {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional string countries_allowed = 0x2;
    optional string countries_forbidden = 0x3;
}

message Image {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes file_id = 0x1;
}

message ImageGroup {
    option (nanopb_msgopt).type = FT_CALLBACK;
    repeated Image image = 0x1;
}

message Album {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes gid = 0x1;
    optional string name = 0x2;
    optional ImageGroup cover_group = 0x11;
}

message Artist {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes gid = 0x1;
    optional string name = 0x2;
}

message Track {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes gid = 1;
    optional string name = 2;
    optional sint32 number = 5;
    optional sint32 disc_number = 6;
    optional sint32 duration = 0x7;
    optional Album album = 0x3;
    repeated Artist artist = 0x4;
    repeated Restriction restriction = 0xb;
    repeated AudioFile file = 0xc;
    repeated Track alternative = 0xd;
}

message Episode {
    option (nanopb_msgopt).type = FT_CALLBACK;
    optional bytes gid = 1;
    optional string name = 2;
    optional sint32 duration = 7;
    optional sint32 number = 65;
    repeated AudioFile file = 12;
    repeated Restriction restriction = 0x4B;
    optional ImageGroup covers = 0x44;
}

enum AudioFormat {
    OGG_VORBIS_96 = 0;
    OGG_VORBIS_160 = 1;
    OGG_VORBIS_320 = 2;
    MP3_256 = 3;
    MP3_320 = 4;
    MP3_160 = 5;
    MP3_96 = 6;
    MP3_160_ENC = 7;
    // Was wrong past index 7 (had AAC_24=8, AAC_48=9, nothing past that) -
    // corrected against librespot's real metadata.proto, matching the
    // identical fix already made and documented in our other project
    // (librespot-cpp). Nanopb decodes/stores unknown-to-us numeric enum
    // values fine regardless, so this was a correctness/readability fix,
    // not something silently failing before.
    MP4_128_DUAL = 8;
    OTHER3 = 9;
    AAC_160 = 10;
    AAC_320 = 11;
    MP4_128 = 12;
    OTHER5 = 13;
}
